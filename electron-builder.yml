appId: app.referenceframe
productName: Reference Frame
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!engine/*'
  - '!scripts/*'
  - '!prompts/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
# The PyInstaller-built engine (scripts/build-engine.ps1 -> engine/dist)
# ships beside the app and is resolved via process.resourcesPath/engine.
extraResources:
  - from: engine/dist/refframe-engine
    to: engine
  - from: resources/pro_baselines
    to: pro_baselines
win:
  executableName: reference-frame
nsis:
  artifactName: reference-frame-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
npmRebuild: false
publish:
  provider: github
  owner: ajay-phatak
  repo: reference-frame
