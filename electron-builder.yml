appId: app.referenceframe
productName: Reference Frame
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!engine/*'
  - '!scripts/*'
  - '!prompts/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
# The PyInstaller-built engine (scripts/build-engine.ps1 -> engine/dist)
# ships beside the app and is resolved via process.resourcesPath/engine.
# Pro baselines are no longer bundled (v0.2.0+) — users add their own via the
# Pros tab; the manifest + metrics JSON live in userData, not extraResources.
extraResources:
  - from: engine/dist/refframe-engine
    to: engine
win:
  executableName: reference-frame
nsis:
  artifactName: reference-frame-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
# arm64 only (v0.3.1 decision: Intel Macs are EOL for this workload). No
# `identity` key here on purpose: leaving it unset lets electron-builder fall
# back to ad-hoc signing, which arm64 REQUIRES to launch at all. Setting
# `identity: null` would skip signing entirely and the kernel kills unsigned
# arm64 binaries outright — that's worse than the ad-hoc-signed, Gatekeeper-
# warns-once outcome we get by leaving this alone.
mac:
  target:
    - target: dmg
      arch:
        - arm64
  artifactName: reference-frame-${version}-${arch}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: ajay-phatak
  repo: reference-frame
